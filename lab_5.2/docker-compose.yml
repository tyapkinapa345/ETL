services:
  postgres:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etl-network

  airflow-init:
    image: custom-airflow:slim-2.8.1-python3.11
    container_name: airflow-init
    entrypoint: /bin/bash
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: >
      -c "
        set -e
        echo 'Waiting for postgres...'
        until pg_isready -h postgres -U airflow; do sleep 2; done
        echo 'Initializing Airflow DB...'
        airflow db init
        echo 'Creating admin user...'
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
        echo 'Airflow init completed successfully.'
      "
    networks:
      - etl-network
      
    networks:
      - etl-network

  airflow-webserver:
    image: custom-airflow:slim-2.8.1-python3.11
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: dummy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - etl-network

  airflow-scheduler:
    image: custom-airflow:slim-2.8.1-python3.11
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: scheduler
    networks:
      - etl-network

  jupyter:
    image: custom-airflow:slim-2.8.1-python3.11
    container_name: jupyter-ml
    user: "50000:0"
    working_dir: /opt/airflow
    volumes:
      - .:/opt/airflow
    ports:
      - "8888:8888"
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/opt/airflow
    networks:
      - etl-network

  streamlit:
    image: custom-airflow:slim-2.8.1-python3.11
    container_name: streamlit-app
    user: "50000:0"
    working_dir: /opt/airflow
    volumes:
      - ./app:/opt/airflow/app
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8501:8501"
    command: streamlit run app/app.py --server.address=0.0.0.0 --server.port=8501 --server.headless=true
    networks:
      - etl-network

networks:
  etl-network:
    driver: bridge

volumes:
  postgres_data:
